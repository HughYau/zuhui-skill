# .progress-config.yaml
# Minimal starter version for first-time users.
# Use this when you want one reusable profile without learning the full config yet.

language: zh

profiles:
  weekly-email:
    audience: "张老师"
    advisor_preset: detail-oriented
    format: email
    layout: report
    verbosity: standard
    language: zh
    signature:
      name: ""
      closing: "祝好"

default_profile: weekly-email

style:
  sample_files: []
  style_summary: null

repos:
  - path: .

artifacts:
  scan_dirs:
    - results/
    - notebooks/
    - notes/
  file_patterns:
    - "*.png"
    - "*.ipynb"
    - "*.md"
